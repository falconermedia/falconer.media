<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>falconer.media</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            background: #000;
            color: white;
            position: relative;
        }
        
        #video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: -1;
        }
        
        .content {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 5.5rem;
            font-weight: 700;
            color: #e63939; /* Bold red */
            text-shadow: 
                0 0 20px rgba(230, 57, 57, 0.8),
                0 4px 30px rgba(0, 0, 0, 0.9);
            letter-spacing: -3px;
            line-height: 1;
            user-select: none;
        }
        
        /* Subtle pulse animation */
        @keyframes pulse {
            0%, 100% { opacity: 0.95; }
            50% { opacity: 1; }
        }
        
        .logo-text {
            animation: pulse 4s ease-in-out infinite;
        }
        
        /* Responsive text size */
        @media (max-width: 768px) {
            .logo-text {
                font-size: 3.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- Background Video -->
    <video id="video-background" autoplay loop muted playsinline>
        <!-- Replace this with your MP4 URL -->
        <source src="fox.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    
    <div class="overlay"></div>
    
    <div class="content">
        <h1 class="logo-text">falconer.media</h1>
    </div>

    <script>
        // Optional: Ensure video restarts smoothly
        const video = document.getElementById('video-background');
        video.addEventListener('ended', () => {
            video.currentTime = 0;
            video.play();
        });
    </script>
</body>
</html>
